<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Carousel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }

    /* ── CAROUSEL ── */
    #wbc { position: relative; width: 100%; }
    .wbc-wrapper { overflow: hidden; width: 100%; }
    .wbc-track {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x;
      cursor: grab;
    }
    .wbc-track::-webkit-scrollbar { display: none; }
    .wbc-track.dragging { cursor: grabbing; scroll-behavior: auto; }
    .wbc-slide { flex: 0 0 auto; }
    .wbc-slide img {
      display: block;
      height: 224px;
      width: auto;
      border-radius: 4px;
      pointer-events: none;
    }
    .wbc-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.5);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .wbc-btn:hover { background: rgba(0,0,0,0.85); }
    .wbc-prev { left: 4px; }
    .wbc-next { right: 4px; }

    /* ── MODAL ── */
    #wbc-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0,0,0,0.9);
      align-items: center;
      justify-content: center;
    }
    #wbc-modal.active { display: flex; }

    /* Story card */
    .wbc-story {
      position: relative;
      width: 380px;
      height: 620px;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      user-select: none;
    }
    @media (max-width: 420px) {
      .wbc-story { width: 100vw; height: 100vh; border-radius: 0; }
    }

    /* Progress bars */
    .wbc-progress {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      gap: 3px;
    }
    .wbc-pb {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }
    .wbc-pb-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
    }

    /* Background image */
    .wbc-story-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: background-image 0.1s;
    }
    .wbc-story-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* Close */
    .wbc-story-close {
      position: absolute;
      top: 6px;
      right: 8px;
      z-index: 30;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Nav zones (left 35% = prev, right 35% = next) */
    .wbc-story-zone {
      position: absolute;
      top: 40px;
      bottom: 72px;
      width: 35%;
      z-index: 25;
      cursor: pointer;
    }
    .wbc-zone-prev { left: 0; }
    .wbc-zone-next { right: 0; }

    /* CTA */
    .wbc-story-cta {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      display: block;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
      transition: background 0.2s;
    }
    .wbc-story-cta:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<!-- Carousel -->
<div id="wbc">
  <div class="wbc-wrapper">
    <div class="wbc-track" id="wbc-track"></div>
  </div>
  <button class="wbc-btn wbc-prev" id="wbc-prev" aria-label="Anterior">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="wbc-btn wbc-next" id="wbc-next" aria-label="Próximo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- Stories Modal -->
<div id="wbc-modal">
  <div class="wbc-story" id="wbc-story">
    <div class="wbc-progress" id="wbc-progress"></div>
    <button class="wbc-story-close" id="wbc-story-close">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="wbc-story-img" id="wbc-story-img"></div>
    <div class="wbc-story-zone wbc-zone-prev" id="wbc-zone-prev"></div>
    <div class="wbc-story-zone wbc-zone-next" id="wbc-zone-next"></div>
    <a class="wbc-story-cta" id="wbc-story-cta" target="_blank">Ver Promoção</a>
  </div>
</div>

<script>
(function () {

  var BANNERS = [
    { href: 'https://f12.bet.br/promotions/freebet-20',              src: 'https://f12promo.com/wp-content/uploads/2026/06/10.06-FREEBET-20-F12.jpg',            alt: 'Freebet 20' },
    { href: 'https://f12.bet.br/promotions/selecao-gol-premiado',    src: 'https://f12promo.com/wp-content/uploads/2026/06/11.06-gol-premiado-f12.jpg',           alt: 'Gol Premiado' },
    { href: '/promotions/indique-e-ganhe',                           src: 'https://f12promo.com/wp-content/uploads/2026/04/indique-e-ganhe.png',                  alt: 'Indique e Ganhe' },
    { href: '/promotions/super-odds',                                src: 'https://f12promo.com/wp-content/uploads/2026/04/5.Superodds.png',                      alt: 'Super Odds' },
    { href: '/promotions/cashout',                                   src: 'https://f12promo.com/wp-content/uploads/2026/04/3.Cashout.png',                        alt: 'Cashout' },
    { href: '/promotions/multipla-incomparavel',                     src: 'https://f12promo.com/wp-content/uploads/2026/04/4.Multipla.png',                       alt: 'Múltipla Incomparável' },
    { href: '/promotions/antecipado-nba',                            src: 'https://f12promo.com/wp-content/uploads/2026/04/6.Pagamento-Antecipado-basket.png',    alt: 'Pagamento Antecipado NBA' },
    { href: '/promotions/pagamento-antecipado',                      src: 'https://f12promo.com/wp-content/uploads/2026/04/1.Pagamento-Antecipado.png',           alt: 'Pagamento Antecipado' },
    { href: 'https://f12.bet.br/sports/basquete/nba/c-2980',         src: 'https://f12promo.com/wp-content/uploads/2026/05/nba.png',                             alt: 'NBA' },
    { href: '/promotions/criar-aposta',                              src: 'https://f12promo.com/wp-content/uploads/2026/04/2.Criar-Aposta.png',                   alt: 'Criar Aposta' },
    { href: '/sports/futebol/brasileirao-serie-a/c-11318',           src: 'https://f12promo.com/wp-content/uploads/2026/05/1.Pagamento-Antecipado.png',           alt: 'Brasileirão Série A' },
    { href: 'https://f12.bet.br/betting-terms',                      src: 'https://f12promo.com/wp-content/uploads/2026/05/Termos.png',                          alt: 'Termos e Condições' },
  ];

  var STORY_DURATION = 8000;

  // ── BUILD CAROUSEL SLIDES ──
  var track = document.getElementById('wbc-track');

  BANNERS.forEach(function (b, i) {
    var slide = document.createElement('div');
    slide.className = 'wbc-slide';
    slide.dataset.index = i;
    var img = document.createElement('img');
    img.src = b.src;
    img.alt = b.alt;
    img.loading = 'lazy';
    slide.appendChild(img);
    track.appendChild(slide);
  });

  // ── CAROUSEL BEHAVIOR ──
  var btnPrev = document.getElementById('wbc-prev');
  var btnNext = document.getElementById('wbc-next');
  var SCROLL_AMOUNT = 300;
  var SPEED = 0.5;
  var autoPaused = false;
  var isDragging = false;
  var startX = 0;
  var startScroll = 0;
  var halfWidth = 0;

  function initInfinite() {
    var origSlides = track.querySelectorAll('.wbc-slide');
    origSlides.forEach(function (s) {
      var clone = s.cloneNode(true);
      clone.removeAttribute('data-index');
      track.appendChild(clone);
    });
    halfWidth = track.scrollWidth / 2;
  }

  function autoScroll() {
    if (!autoPaused && !isDragging) {
      track.scrollLeft += SPEED;
      if (track.scrollLeft >= halfWidth) track.scrollLeft -= halfWidth;
    }
    requestAnimationFrame(autoScroll);
  }

  btnPrev.addEventListener('click', function () { track.scrollBy({ left: -SCROLL_AMOUNT, behavior: 'smooth' }); });
  btnNext.addEventListener('click', function () { track.scrollBy({ left: SCROLL_AMOUNT, behavior: 'smooth' }); });

  track.addEventListener('mouseenter', function () { autoPaused = true; });
  track.addEventListener('mouseleave', function () { autoPaused = false; });
  track.addEventListener('touchstart', function () { autoPaused = true; }, { passive: true });
  track.addEventListener('touchend', function () { autoPaused = false; });

  track.addEventListener('mousedown', function (e) {
    isDragging = true;
    startX = e.pageX;
    startScroll = track.scrollLeft;
    track.classList.add('dragging');
  });
  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    track.scrollLeft = startScroll - (e.pageX - startX);
  });
  document.addEventListener('mouseup', function () {
    isDragging = false;
    track.classList.remove('dragging');
  });

  // Click slide → open story
  track.addEventListener('click', function (e) {
    if (Math.abs(track.scrollLeft - startScroll) > 5) return;
    var slide = e.target.closest('[data-index]');
    if (!slide) return;
    openStory(parseInt(slide.dataset.index, 10));
  });

  initInfinite();
  requestAnimationFrame(autoScroll);

  // ── STORY MODAL ──
  var modal    = document.getElementById('wbc-modal');
  var storyImg = document.getElementById('wbc-story-img');
  var storyCta = document.getElementById('wbc-story-cta');
  var progEl   = document.getElementById('wbc-progress');
  var closeBtn = document.getElementById('wbc-story-close');
  var zonePrev = document.getElementById('wbc-zone-prev');
  var zoneNext = document.getElementById('wbc-zone-next');
  var fills    = [];
  var current  = 0;
  var timer    = null;

  function buildBars() {
    progEl.innerHTML = '';
    fills = [];
    BANNERS.forEach(function () {
      var bar  = document.createElement('div'); bar.className = 'wbc-pb';
      var fill = document.createElement('div'); fill.className = 'wbc-pb-fill';
      bar.appendChild(fill);
      progEl.appendChild(bar);
      fills.push(fill);
    });
  }

  function animateBar(idx) {
    fills.forEach(function (f, i) {
      f.style.transition = 'none';
      f.style.width = i < idx ? '100%' : '0%';
    });
    var f = fills[idx];
    f.offsetWidth; // force reflow
    f.style.transition = 'width ' + (STORY_DURATION / 1000) + 's linear';
    f.style.width = '100%';
  }

  function showSlide(idx) {
    clearTimeout(timer);
    var b = BANNERS[idx];
    storyImg.style.backgroundImage = 'url("' + b.src + '")';
    storyCta.href = b.href;
    animateBar(idx);
    timer = setTimeout(function () {
      idx < BANNERS.length - 1 ? showSlide(idx + 1) : closeStory();
      current = idx + 1;
    }, STORY_DURATION);
  }

  function openStory(idx) {
    current = idx;
    buildBars();
    modal.classList.add('active');
    autoPaused = true;
    showSlide(idx);
  }

  function closeStory() {
    clearTimeout(timer);
    modal.classList.remove('active');
    autoPaused = false;
  }

  function goNext() {
    if (current < BANNERS.length - 1) { current++; showSlide(current); }
    else closeStory();
  }

  function goPrev() {
    if (current > 0) { current--; showSlide(current); }
  }

  closeBtn.addEventListener('click', closeStory);
  modal.addEventListener('click', function (e) { if (e.target === modal) closeStory(); });
  zonePrev.addEventListener('click', goPrev);
  zoneNext.addEventListener('click', goNext);

  document.addEventListener('keydown', function (e) {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Escape')     closeStory();
  });

  // Touch swipe inside story
  var tStartX = 0;
  document.getElementById('wbc-story').addEventListener('touchstart', function (e) {
    tStartX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('wbc-story').addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - tStartX;
    if (dx < -50) goNext();
    if (dx >  50) goPrev();
  });

})();
</script>

</body>
</html>
