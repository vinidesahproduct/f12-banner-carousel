<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Carousel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: transparent; overflow: hidden; }

    /* ── CAROUSEL ── */
    #wbc { position: relative; width: 100%; }
    .wbc-wrapper { overflow: hidden; width: 100%; }

    @keyframes wbc-scroll {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .wbc-track {
      display: flex;
      gap: 8px;
      width: max-content;
      will-change: transform;
      animation: wbc-scroll 30s linear infinite;
      cursor: grab;
    }
    .wbc-track.paused  { animation-play-state: paused; }
    .wbc-track.dragging { cursor: grabbing; animation-play-state: paused; }
    .wbc-slide { flex: 0 0 auto; }
    .wbc-slide img {
      display: block;
      height: 224px;
      width: auto;
      border-radius: 4px;
      pointer-events: none;
    }
    .wbc-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.5);
      color: #fff;
      cursor: pointer;
      transition: background 0.2s;
    }
    .wbc-btn:hover { background: rgba(0,0,0,0.85); }
    .wbc-prev { left: 4px; }
    .wbc-next { right: 4px; }

    /* ── MODAL ── */
    #wbc-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }
    #wbc-modal.active { display: flex; }

    /* Wrapper: story + thumbs */
    .wbc-modal-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Story card */
    .wbc-story {
      position: relative;
      width: 380px;
      height: 620px;
      border-radius: 12px;
      overflow: hidden;
      background: #111;
      box-shadow: 0 24px 64px rgba(0,0,0,0.8);
      user-select: none;
    }
    @media (max-width: 480px) {
      #wbc-modal {
        align-items: stretch;
        padding: 0;
      }
      .wbc-modal-inner {
        width: 100%;
        height: 100vh;
        height: 100dvh;
        gap: 0;
        justify-content: space-between;
      }
      .wbc-story {
        width: 100%;
        flex: 1 1 auto;
        min-height: 0;
        border-radius: 0;
      }
      .wbc-thumbs {
        flex: 0 0 auto;
        max-width: 100%;
        padding: 6px 8px;
        background: rgba(0,0,0,0.6);
      }
      .wbc-thumb { height: 80px; }
    }

    /* Progress bars */
    .wbc-progress {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      z-index: 20;
      display: flex;
      gap: 3px;
    }
    .wbc-pb {
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }
    .wbc-pb-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 2px;
    }

    /* Background image */
    .wbc-story-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
    }
    .wbc-story-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.2) 0%,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0.55) 100%
      );
    }

    /* Close */
    .wbc-story-close {
      position: absolute;
      top: 6px;
      right: 8px;
      z-index: 30;
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Nav zones (invisible tap areas) */
    .wbc-story-zone {
      position: absolute;
      top: 40px;
      bottom: 72px;
      width: 35%;
      z-index: 25;
      cursor: pointer;
    }
    .wbc-zone-prev { left: 0; }
    .wbc-zone-next { right: 0; }

    /* Visible arrow buttons */
    .wbc-story-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 26;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, opacity 0.2s;
      pointer-events: none; /* zones handle clicks; arrows are visual only */
    }
    .wbc-story-arrow.is-hidden { opacity: 0; }
    .wbc-arrow-prev { left: 8px; }
    .wbc-arrow-next { right: 8px; }

    /* CTA */
    .wbc-story-cta {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      padding: 12px 32px;
      border-radius: 8px;
      border: none;
      background: #5acd03;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      display: block;
      box-shadow: 0 2px 16px rgba(0,0,0,0.4);
      transition: background 0.2s;
    }
    .wbc-story-cta:hover { background: #4db502; }

    /* ── THUMBNAIL STRIP ── */
    .wbc-thumbs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      max-width: 380px;
      width: 100%;
      padding: 2px 0;
    }
    .wbc-thumbs::-webkit-scrollbar { display: none; }
    .wbc-thumb {
      flex: 0 0 auto;
      position: relative;
      height: 100px;
      min-width: 60px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 3px solid transparent;
      transition: border-color 0.2s;
      background: #222;
    }
    .wbc-thumb.active { border-color: #fff; }
    .wbc-thumb img {
      height: 100%;
      width: auto;
      display: block;
      pointer-events: none;
    }
    .wbc-thumb-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 6px 5px;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      color: #fff;
      font-family: sans-serif;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>

<!-- Carousel -->
<div id="wbc">
  <div class="wbc-wrapper">
    <div class="wbc-track" id="wbc-track"></div>
  </div>
  <button class="wbc-btn wbc-prev" id="wbc-prev" aria-label="Anterior">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M10 4L6 8L10 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
  <button class="wbc-btn wbc-next" id="wbc-next" aria-label="Próximo">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>

<!-- Stories Modal -->
<div id="wbc-modal">
  <div class="wbc-modal-inner">

    <div class="wbc-story" id="wbc-story">
      <div class="wbc-progress" id="wbc-progress"></div>

      <button class="wbc-story-close" id="wbc-story-close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </button>

      <div class="wbc-story-img" id="wbc-story-img"></div>

      <!-- invisible tap zones -->
      <div class="wbc-story-zone wbc-zone-prev" id="wbc-zone-prev"></div>
      <div class="wbc-story-zone wbc-zone-next" id="wbc-zone-next"></div>

      <!-- visible arrows (pointer-events: none — zones handle clicks) -->
      <div class="wbc-story-arrow wbc-arrow-prev" id="wbc-arrow-prev">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 4L6 8L10 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="wbc-story-arrow wbc-arrow-next" id="wbc-arrow-next">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 4L10 8L6 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <a class="wbc-story-cta" id="wbc-story-cta" target="_blank">Ver Promoção</a>
    </div>

    <!-- Thumbnail strip -->
    <div class="wbc-thumbs" id="wbc-thumbs"></div>

  </div>
</div>

<script>
(function () {

  // cta: 'participe' = horizontal/landscape banners | 'saiba' = vertical/portrait banners
  var BANNERS = [
    { href: 'https://f12.bet.br/promotions/freebet-20',              src: 'https://f12promo.com/wp-content/uploads/2026/06/10.06-FREEBET-20-F12.jpg',            alt: 'Freebet 20',              cta: 'participe' },
    { href: 'https://f12.bet.br/promotions/selecao-gol-premiado',    src: 'https://f12promo.com/wp-content/uploads/2026/06/11.06-gol-premiado-f12.jpg',           alt: 'Gol Premiado',            cta: 'participe' },
    { href: '/promotions/indique-e-ganhe',                           src: 'https://f12promo.com/wp-content/uploads/2026/04/indique-e-ganhe.png',                  alt: 'Indique e Ganhe',         cta: 'saiba' },
    { href: '/promotions/super-odds',                                src: 'https://f12promo.com/wp-content/uploads/2026/04/5.Superodds.png',                      alt: 'Super Odds',              cta: 'saiba' },
    { href: '/promotions/cashout',                                   src: 'https://f12promo.com/wp-content/uploads/2026/04/3.Cashout.png',                        alt: 'Cashout',                 cta: 'saiba' },
    { href: '/promotions/multipla-incomparavel',                     src: 'https://f12promo.com/wp-content/uploads/2026/04/4.Multipla.png',                       alt: 'Múltipla Incomparável',   cta: 'saiba' },
    { href: '/promotions/antecipado-nba',                            src: 'https://f12promo.com/wp-content/uploads/2026/04/6.Pagamento-Antecipado-basket.png',    alt: 'Pagamento Antecipado NBA',cta: 'saiba' },
    { href: '/promotions/pagamento-antecipado',                      src: 'https://f12promo.com/wp-content/uploads/2026/04/1.Pagamento-Antecipado.png',           alt: 'Pagamento Antecipado',    cta: 'saiba' },
    { href: 'https://f12.bet.br/sports/basquete/nba/c-2980',         src: 'https://f12promo.com/wp-content/uploads/2026/05/nba.png',                             alt: 'NBA',                     cta: 'participe' },
    { href: '/promotions/criar-aposta',                              src: 'https://f12promo.com/wp-content/uploads/2026/04/2.Criar-Aposta.png',                   alt: 'Criar Aposta',            cta: 'saiba' },
    { href: '/sports/futebol/brasileirao-serie-a/c-11318',           src: 'https://f12promo.com/wp-content/uploads/2026/05/1.Pagamento-Antecipado.png',           alt: 'Brasileirão Série A',     cta: 'participe' },
    { href: 'https://f12.bet.br/betting-terms',                      src: 'https://f12promo.com/wp-content/uploads/2026/05/Termos.png',                          alt: 'Termos e Condições',      cta: 'saiba' },
  ];

  var STORY_DURATION = 8000;

  // ── BUILD CAROUSEL ──
  var track = document.getElementById('wbc-track');

  BANNERS.forEach(function (b, i) {
    var slide = document.createElement('div');
    slide.className = 'wbc-slide';
    slide.dataset.index = i;
    var img = document.createElement('img');
    img.src = b.src; img.alt = b.alt; img.loading = 'lazy';
    slide.appendChild(img);
    track.appendChild(slide);
  });

  // ── CAROUSEL BEHAVIOR ──
  var btnPrev    = document.getElementById('wbc-prev');
  var btnNext    = document.getElementById('wbc-next');
  var STEP       = 300; // px per button click
  var DURATION   = 30;  // seconds for full loop
  var isDragging = false;
  var dragStartX = 0;
  var dragStartTX = 0; // translateX at drag start

  // Clone slides for seamless loop
  Array.from(track.querySelectorAll('.wbc-slide')).forEach(function (s) {
    var clone = s.cloneNode(true);
    clone.removeAttribute('data-index');
    track.appendChild(clone);
  });

  // Set duration based on content width for consistent speed (~30px/s)
  requestAnimationFrame(function () {
    var halfW = track.scrollWidth / 2;
    DURATION = halfW / 30;
    track.style.animationDuration = DURATION + 's';
  });

  // Pause / resume helpers
  function pauseAnim()  { track.classList.add('paused'); }
  function resumeAnim() { track.classList.remove('paused'); }

  // Get current translateX from computed style
  function getCurrentTX() {
    var t = window.getComputedStyle(track).transform;
    if (!t || t === 'none') return 0;
    var m = t.match(/matrix\(([^)]+)\)/);
    return m ? parseFloat(m[1].split(',')[4]) : 0;
  }

  // Jump to an absolute pixel offset in the loop
  function jumpTo(px) {
    var halfW = track.scrollWidth / 2;
    px = ((px % halfW) + halfW) % halfW;
    var progress = px / halfW;
    track.style.animationDelay = -(progress * DURATION) + 's';
    resumeAnim();
  }

  // Hover pause (desktop)
  track.addEventListener('mouseenter', pauseAnim);
  track.addEventListener('mouseleave', resumeAnim);

  // Touch pause (mobile) — brief pause while finger is down; NOT during auto-scroll
  track.addEventListener('touchstart', pauseAnim, { passive: true });
  track.addEventListener('touchend',   resumeAnim);

  // Nav buttons
  btnPrev.addEventListener('click', function () {
    jumpTo(-getCurrentTX() - STEP);
  });
  btnNext.addEventListener('click', function () {
    jumpTo(-getCurrentTX() + STEP);
  });

  // Drag to scroll (desktop)
  track.addEventListener('mousedown', function (e) {
    isDragging = true;
    dragStartX  = e.pageX;
    dragStartTX = getCurrentTX();
    pauseAnim();
    track.classList.add('dragging');
  });
  document.addEventListener('mousemove', function (e) {
    if (!isDragging) return;
    var delta = e.pageX - dragStartX;
    track.style.transform = 'translateX(' + (dragStartTX + delta) + 'px)';
  });
  document.addEventListener('mouseup', function (e) {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');
    track.style.transform = '';
    var delta = e.pageX - dragStartX;
    jumpTo(-dragStartTX - delta);
  });

  // Click → open story (only if not dragged)
  track.addEventListener('click', function (e) {
    if (Math.abs(e.pageX - dragStartX) > 5) return;
    var slide = e.target.closest('[data-index]');
    if (slide) openStory(parseInt(slide.dataset.index, 10));
  });

  // ── STORY MODAL ──
  var modal      = document.getElementById('wbc-modal');
  var storyImg   = document.getElementById('wbc-story-img');
  var storyCta   = document.getElementById('wbc-story-cta');
  var progEl     = document.getElementById('wbc-progress');
  var closeBtn   = document.getElementById('wbc-story-close');
  var zonePrev   = document.getElementById('wbc-zone-prev');
  var zoneNext   = document.getElementById('wbc-zone-next');
  var arrowPrev  = document.getElementById('wbc-arrow-prev');
  var arrowNext  = document.getElementById('wbc-arrow-next');
  var thumbsEl   = document.getElementById('wbc-thumbs');
  var fills      = [];
  var thumbEls   = [];
  var current    = 0;
  var timer      = null;

  function buildBars() {
    progEl.innerHTML = ''; fills = [];
    BANNERS.forEach(function () {
      var bar = document.createElement('div'); bar.className = 'wbc-pb';
      var fill = document.createElement('div'); fill.className = 'wbc-pb-fill';
      bar.appendChild(fill); progEl.appendChild(bar); fills.push(fill);
    });
  }

  function buildThumbs() {
    thumbsEl.innerHTML = ''; thumbEls = [];
    BANNERS.forEach(function (b, i) {
      var thumb = document.createElement('div');
      thumb.className = 'wbc-thumb';
      thumb.dataset.index = i;
      var img = document.createElement('img');
      img.src = b.src; img.alt = b.alt; img.loading = 'eager';
      var label = document.createElement('div');
      label.className = 'wbc-thumb-label';
      label.textContent = b.alt;
      thumb.appendChild(img);
      thumb.appendChild(label);
      thumb.addEventListener('click', function () { current = i; showSlide(i); });
      thumbsEl.appendChild(thumb);
      thumbEls.push(thumb);
    });
  }

  function animateBar(idx) {
    fills.forEach(function (f, i) {
      f.style.transition = 'none';
      f.style.width = i < idx ? '100%' : '0%';
    });
    var f = fills[idx];
    f.offsetWidth;
    f.style.transition = 'width ' + (STORY_DURATION / 1000) + 's linear';
    f.style.width = '100%';
  }

  function updateArrows(idx) {
    arrowPrev.classList.toggle('is-hidden', idx === 0);
    arrowNext.classList.toggle('is-hidden', idx === BANNERS.length - 1);
  }

  function updateThumbActive(idx) {
    thumbEls.forEach(function (t, i) { t.classList.toggle('active', i === idx); });
    // scroll active thumb into view
    var active = thumbEls[idx];
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function showSlide(idx) {
    clearTimeout(timer);
    current = idx;
    var b = BANNERS[idx];
    storyImg.style.backgroundImage = 'url("' + b.src + '")';
    storyCta.href = b.href;
    storyCta.textContent = b.cta === 'participe' ? 'Clique e Participe' : 'Saiba Mais';
    animateBar(idx);
    updateArrows(idx);
    updateThumbActive(idx);
    timer = setTimeout(function () {
      if (current < BANNERS.length - 1) showSlide(current + 1);
      else closeStory();
    }, STORY_DURATION);
  }

  function openStory(idx) {
    buildBars();
    buildThumbs();
    modal.classList.add('active');
    autoPaused = true;
    showSlide(idx);
  }

  function closeStory() {
    clearTimeout(timer);
    modal.classList.remove('active');
    autoPaused = false;
  }

  function goNext() {
    if (current < BANNERS.length - 1) showSlide(current + 1);
    else closeStory();
  }

  function goPrev() {
    if (current > 0) showSlide(current - 1);
  }

  closeBtn.addEventListener('click', closeStory);
  modal.addEventListener('click', function (e) { if (e.target === modal) closeStory(); });
  zonePrev.addEventListener('click', goPrev);
  zoneNext.addEventListener('click', goNext);

  document.addEventListener('keydown', function (e) {
    if (!modal.classList.contains('active')) return;
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'ArrowLeft')  goPrev();
    if (e.key === 'Escape')     closeStory();
  });

  var tStartX = 0;
  document.getElementById('wbc-story').addEventListener('touchstart', function (e) {
    tStartX = e.touches[0].clientX;
  }, { passive: true });
  document.getElementById('wbc-story').addEventListener('touchend', function (e) {
    var dx = e.changedTouches[0].clientX - tStartX;
    if (dx < -50) goNext();
    if (dx >  50) goPrev();
  });

})();
</script>

</body>
</html>
